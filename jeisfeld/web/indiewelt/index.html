<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Conny & Lisa - In die Welt</title>
<style>
body {
	font-family: system-ui, sans-serif;
	margin: 0;
	background: #111;
	color: #eee;
}

.wrap {
	max-width: 900px;
	margin: 0 auto;
	padding: 24px;
	display: grid;
	gap: 24px;
	grid-template-columns: 280px 1fr;
}

img {
	width: 100%;
	border-radius: 12px;
	box-shadow: 0 8px 30px rgba(0, 0, 0, .4);
}

h1 {
	margin: 0 0 8px;
	font-size: 24px;
}

audio {
	width: 100%;
	margin: 12px 0 8px;
}

ul {
	list-style: none;
	padding: 0;
	margin: 0;
	border-radius: 12px;
	overflow: hidden;
	border: 1px solid #2a2a2a;
}

li {
	display: flex;
	justify-content: space-between;
	gap: 12px;
	padding: 3px 14px;
	cursor: pointer;
	background: #161616;
	border-top: 1px solid #2a2a2a;
}

li:first-child {
	border-top: 0;
}

li:hover {
	background: #1d1d1d;
}

li.active {
	background: #2a2a2a;
}

.meta {
	opacity: .7;
	font-size: 13px;
}

.row {
	display: flex;
	align-items: baseline;
	gap: 10px;
}

button {
	background: #2a2a2a;
	color: #eee;
	border: 1px solid #3a3a3a;
	padding: 10px 12px;
	border-radius: 10px;
	cursor: pointer;
}

button:hover {
	background: #333;
}

.icon-btn {
	font-size: 18px;
	line-height: 1;
	min-width: 46px;
	padding: 10px;
}


.social-links {
	margin-top: 14px;
	display: grid;
	gap: 8px;
}

.social-links a {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 8px 10px;
	background: #161616;
	border: 1px solid #2a2a2a;
	border-radius: 10px;
	color: #eee;
	text-decoration: none;
}

.social-links a:hover {
	background: #1d1d1d;
}

.icon {
	width: 20px;
	height: 20px;
	fill: currentColor;
}

@media ( max-width : 760px) {
	.wrap {
		grid-template-columns: 1fr;
	}
}


@media ( max-width : 480px) {
	.wrap {
		padding: 16px;
	}

	li {
		padding: 3px 8px;
	}

	.row {
		font-size: 14px;
		gap: 6px;
	}
}
</style>
</head>
<body>
	<div class="wrap">
		<div>
			<img src="cover.jpg" alt="Album cover" />

			<div class="social-links">
				<a href="https://www.youtube.com/watch?v=GWbdiFXUXbE&list=OLAK5uy_l1tE9U6aqs6wi1HobaYC0JN-ni1I1cHVc" target="_blank" rel="noopener noreferrer">
					<svg class="icon" aria-hidden="true">
						<use xlink:href="/img/icons.svg#icon-youtube"></use>
					</svg>
					Youtube
				</a>
				<a href="https://open.spotify.com/album/7GqxiaDlEQH6r72SIAENaR" target="_blank" rel="noopener noreferrer">
					<svg class="icon" aria-hidden="true">
						<use xlink:href="/img/icons.svg#icon-spotify"></use>
					</svg>
					Spotify
				</a>
				<a target="_blank" rel="noopener noreferrer">
					<svg class="icon" aria-hidden="true">
						<use xlink:href="/img/icons.svg?v=3#icon-apple-music"></use>
					</svg>
					Apple Music
				</a>
				<a href="https://amazon.de/music/player/albums/B0H1SFR4JH" target="_blank" rel="noopener noreferrer">
					<svg class="icon" aria-hidden="true">
						<use xlink:href="/img/icons.svg?v=3#icon-amazon-music"></use>
					</svg>
					Amazon Music
				</a>
			</div>
		</div>

		<div>
			<h1 id="albumTitle">Conny & L!sa - In die Welt</h1>
			<div class="meta" id="nowPlaying">Not playing</div>

			<audio id="player" controls preload="metadata"></audio>

			<div style="display: flex; gap: 10px; margin: 10px 0 14px;">
				<button id="prevBtn" class="icon-btn" type="button" aria-label="Previous track" title="Previous track">⏮</button>
				<button id="playPauseBtn" class="icon-btn" type="button" aria-label="Play or pause" title="Play/Pause">⏯</button>
				<button id="nextBtn" class="icon-btn" type="button" aria-label="Next track" title="Next track">⏭</button>
			</div>

			<ul id="playlist"></ul>
		</div>
	</div>

	<script>
    // 1) Edit this list to match your MP3 files
	const tracks = [
	  { title: "In mir", file: "tracks/01 In mir.mp3" },
	  { title: "In die Welt", file: "tracks/02 In die Welt.mp3" },
	  { title: "Abdrücke von euch in mir", file: "tracks/03 Abdrücke von euch in mir.mp3" },
	  { title: "Ich sollte - heute nicht I", file: "tracks/04 Ich sollte - heute nicht (Spoken).mp3" },
	  { title: "Ich sollte - heute nicht II", file: "tracks/05 Ich sollte - heute nicht (Rock Op.mp3" },
	  { title: "Der Tornado", file: "tracks/06 Der Tornado.mp3" },
	  { title: "Worte für Dich und mich", file: "tracks/07 Worte für Dich und mich.mp3" },
	  { title: "Eine geheime Kraft", file: "tracks/08 Eine geheime Kraft.mp3" },
	  { title: "Ein Tag ohne Dich", file: "tracks/09 Ein Tag ohne Dich.mp3" },
	  { title: "Der Tanz mit den Gefühlen I", file: "tracks/10 Der Tanz mit den Gefühlen (Spoken.mp3" },
	  { title: "Der Tanz mit den Gefühlen II", file: "tracks/11 Der Tanz mit den Gefühlen (Acoust.mp3" },
	  { title: "Gefunden", file: "tracks/12 Gefunden.mp3" },
	  { title: "Verlorenes Herzstück", file: "tracks/13 Verlorenes Herzstück.mp3" },
	  { title: "Über Leben", file: "tracks/14 Über Leben (Spoken).mp3" },
	  { title: "Lied des Lebens", file: "tracks/15 Lied des Lebens.mp3" },
	  { title: "Schmelzend", file: "tracks/16 Schmelzend.mp3" },
	  { title: "Meine Wahrheit", file: "tracks/17 Meine Wahrheit.mp3" },
	];


    const player = document.getElementById("player");
    const playlistEl = document.getElementById("playlist");
    const nowPlayingEl = document.getElementById("nowPlaying");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");

    let currentIndex = 0;

    function renderPlaylist() {
      playlistEl.innerHTML = "";
      tracks.forEach((t, i) => {
        const li = document.createElement("li");
        li.dataset.index = i;

        const left = document.createElement("div");
        left.className = "row";
        left.innerHTML = `<strong>${String(i + 1).padStart(2, "0")}.</strong> <span>${t.title}</span>`;

        const right = document.createElement("div");
        right.className = "meta";
        right.textContent = "▶";

        li.appendChild(left);
        li.appendChild(right);

        li.addEventListener("click", () => playIndex(i, true));
        playlistEl.appendChild(li);
      });
      highlightActive();
    }

    function highlightActive() {
      [...playlistEl.children].forEach((li) => li.classList.remove("active"));
      const active = playlistEl.children[currentIndex];
      if (active) active.classList.add("active");
    }

    function setNowPlaying(text) {
      nowPlayingEl.textContent = text;
    }

    function playIndex(index, autoplay = false) {
      if (index < 0 || index >= tracks.length) return;
      currentIndex = index;

      player.src = tracks[currentIndex].file;
      player.load();

      highlightActive();
      setNowPlaying(`Selected: ${tracks[currentIndex].title}`);

      if (autoplay) {
        // Note: some browsers require a user gesture before audio playback.
        player.play().then(() => {
          setNowPlaying(`Playing: ${tracks[currentIndex].title}`);
        }).catch(() => {
          setNowPlaying(`Ready to play: ${tracks[currentIndex].title} (press Play)`);
        });
      }
    }

    function nextTrack() {
      const next = (currentIndex + 1) % tracks.length; // loop back to start
      playIndex(next, true);
    }

    function prevTrack() {
      const prev = (currentIndex - 1 + tracks.length) % tracks.length;
      playIndex(prev, true);
    }

    // Auto-advance when a song ends
    player.addEventListener("ended", nextTrack);

    // Update UI on play/pause
    player.addEventListener("play", () => setNowPlaying(`Playing: ${tracks[currentIndex].title}`));
    player.addEventListener("pause", () => setNowPlaying(`Paused: ${tracks[currentIndex].title}`));

    prevBtn.addEventListener("click", prevTrack);
    nextBtn.addEventListener("click", nextTrack);
    playPauseBtn.addEventListener("click", () => {
      if (player.paused) player.play();
      else player.pause();
    });

    // Init
    renderPlaylist();
    playIndex(0, false);
  </script>
</body>
</html>
